<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YearRingView</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── THEMES ── */
  :root[data-theme="dark"] {
    --bg:       #0c0d0f;
    --surface:  #13151a;
    --surface2: #1a1c23;
    --border:   #22252e;
    --border2:  #2c303c;
    --text:     #dde0e8;
    --muted:    #52566a;
    --accent:   #6dbb7a;
    --ring-past:   #1e2029;
    --ring-future: rgba(109,187,122,0.12);
    --ring-border: #2a2d38;
    --tick-past:   #2a2d3a;
    --compass-ring: rgba(255,255,255,0.20);
    --compass-arrow: rgba(255,255,255,0.68);
    --divider-line: rgba(255,255,255,0.03);
    --cal-invert: 0.5;
  }
  :root[data-theme="light"] {
    --bg:       #f4f5f7;
    --surface:  #ffffff;
    --surface2: #eef0f4;
    --border:   #dde0e8;
    --border2:  #cdd0da;
    --text:     #1a1c24;
    --muted:    #888da0;
    --accent:   #4da85e;
    --ring-past:   #dde0e8;
    --ring-future: rgba(77,168,94,0.10);
    --ring-border: #c8ccd8;
    --tick-past:   #c8ccd8;
    --compass-ring: rgba(0,0,0,0.15);
    --compass-arrow: rgba(0,0,0,0.55);
    --divider-line: rgba(0,0,0,0.06);
    --cal-invert: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 80px;
    gap: 20px;
    transition: background 0.3s, color 0.3s;
  }

  /* ── TOP BAR ── */
  .top-bar {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .top-bar-controls {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  /* ── BRAND ── */
  .brand { text-align: center; }
  .brand-title {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }
  .brand-title .ring  { color: var(--accent); }
  .brand-title .view  { color: #d4884a; }
  .brand-sub {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
    text-align: center;
  }
  .brand-author {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.56rem;
    color: var(--text);
    letter-spacing: 0.14em;
    opacity: 0.55;
    margin-top: 4px;
    text-align: center;
  }

  /* ── THEME TOGGLE ── */
  .theme-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 4px;
    flex-shrink: 0;
  }
  .theme-icon { font-size: 0.8rem; }
  .toggle-switch {
    position: relative;
    width: 38px; height: 20px;
    flex-shrink: 0;
  }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border2);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.2s;
    pointer-events: none;
  }
  .toggle-switch input:checked ~ .toggle-thumb { left: 21px; }

  /* ── DIVIDER ── */
  .divider { width: 40px; height: 1px; background: var(--border); margin: 0 auto; }

  /* ── DATE HEADER ── */
  .date-header { text-align: center; }
  .date-label {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0.18em;
  }
  .date-label .month   { font-weight: 700; }
  .date-label .day-num { font-weight: 700; }
  .date-label .year    { font-weight: 300; opacity: 0.38; }
  .date-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; color: var(--muted);
    letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px;
  }

  /* ── RING ── */
  .ring-wrap { display: flex; align-items: center; justify-content: center; }
  canvas#ring { display: block; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.57rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }

  /* ── ADD FORM ── */
  .add-section { width: 100%; max-width: 540px; }
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .fi {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.77rem;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.15s;
  }
  .fi:focus { border-color: var(--accent); }
  .fi::-webkit-calendar-picker-indicator {
    filter: invert(var(--cal-invert));
    cursor: pointer;
  }
  .fi-name { flex: 1; min-width: 160px; }
  .fi-date { width: 148px; flex-shrink: 0; }

  .period-row { display: flex; align-items: center; gap: 10px; }
  .toggle-label-text {
    font-size: 0.68rem; color: var(--muted); cursor: pointer;
    user-select: none; display: flex; align-items: center; gap: 8px;
  }
  /* reuse .toggle-switch, .toggle-track, .toggle-thumb from above */
  .end-date-wrap {
    display: none; align-items: center; gap: 8px; flex: 1;
  }
  .end-date-wrap.visible { display: flex; }
  .end-sep { font-size: 0.62rem; color: var(--muted); white-space: nowrap; }

  .swatches { display: flex; gap: 7px; align-items: center; flex: 1; }
  .swatch {
    width: 20px; height: 20px;
    border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.18); }
  .swatch.active { border-color: var(--text); }

  .add-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.73rem; font-weight: 600;
    padding: 9px 18px; cursor: pointer;
    white-space: nowrap; letter-spacing: 0.04em;
    transition: opacity 0.15s; flex-shrink: 0; margin-left: auto;
  }
  .add-btn:hover { opacity: 0.82; }

  /* ── EVENTS LIST ── */
  .events-section { width: 100%; max-width: 540px; }
  .events-months { display: flex; flex-direction: column; gap: 20px; }
  .month-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.57rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px; margin-bottom: 6px;
  }
  .event-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--divider-line);
    font-size: 0.76rem;
  }
  .ev-bar { width: 3px; border-radius: 2px; flex-shrink: 0; }
  .ev-bar.point  { height: 16px; }
  .ev-bar.period { height: 28px; }
  .event-dates {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted); font-size: 0.64rem; min-width: 80px; line-height: 1.6;
  }
  .event-name { flex: 1; }
  .ev-badge {
    font-size: 0.56rem; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 3px; opacity: 0.8; flex-shrink: 0;
  }
  .event-del {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.72rem;
    opacity: 0.5; transition: opacity 0.15s; padding: 2px 4px;
  }
  .event-del:hover { opacity: 1; color: #d46060; }
  .event-edit {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.72rem;
    opacity: 0.5; transition: opacity 0.15s; padding: 2px 4px;
  }
  .event-edit:hover { opacity: 1; color: var(--accent); }
  .empty-msg { color: var(--muted); font-size: 0.73rem; }

  /* ── INLINE EDIT ── */
  .event-item.editing { flex-wrap: wrap; gap: 6px; padding: 10px 0; }
  .edit-field {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 5px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 8px;
    outline: none;
  }
  .edit-name { flex: 1; min-width: 120px; }
  .edit-date { width: 120px; }
  .edit-save {
    background: var(--accent); color: #fff;
    border: none; border-radius: 5px;
    font-size: 0.72rem; padding: 5px 10px;
    cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
  }
  .edit-cancel {
    background: none; border: 1px solid var(--border2);
    border-radius: 5px; color: var(--muted);
    font-size: 0.72rem; padding: 5px 8px; cursor: pointer;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand">
    <div class="brand-title">Year<span class="ring">Ring</span><span class="view">View</span></div>
    <div class="brand-author">created by Dauren.Bol</div>
    <div class="brand-sub">Весь год одним взглядом. Только то что важно — без лишнего шума.</div>
  </div>
  <div class="top-bar-controls">
    <div class="theme-wrap">
      <span class="theme-icon">🌙</span>
      <label class="toggle-switch">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="theme-icon">☀️</span>
    </div>
    <div id="userInfo" style="display:none;align-items:center;gap:8px;">
      <span id="userEmail" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button onclick="authSignOut()" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted);padding:4px 8px;cursor:pointer;">Выйти</button>
    </div>
    <button id="authBtn" onclick="showAuthUI()" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted);padding:4px 10px;cursor:pointer;">Войти</button>
  </div>
</div>

<div class="divider"></div>

<div class="date-header">
  <div class="date-label" id="topDate">—</div>
  <div class="date-sub" id="topSub">—</div>
</div>

<div class="ring-wrap">
  <canvas id="ring"></canvas>
</div>

<div class="add-section">
  <div class="section-label">Добавить событие</div>
  <div class="form-card">
    <div class="form-row">
      <input type="text" class="fi fi-name" id="evName" placeholder="Название события" />
      <input type="date" class="fi fi-date" id="evDate" />
    </div>
    <div class="period-row">
      <label class="toggle-label-text">
        <div class="toggle-switch">
          <input type="checkbox" id="periodToggle" onchange="togglePeriod()" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
        Период
      </label>
      <div class="end-date-wrap" id="endDateWrap">
        <span class="end-sep">до</span>
        <input type="date" class="fi fi-date" id="evDateEnd" />
      </div>
    </div>
    <div class="form-row">
      <div class="swatches" id="swatches"></div>
      <button class="add-btn" onclick="addEvent()">+ Добавить</button>
    </div>
  </div>
</div>

<div class="events-section">
  <div class="section-label">События года</div>
  <div class="events-months" id="eventsList"></div>
</div>

<script>
// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('yrTheme', isDark ? 'light' : 'dark');
  draw();
}
// restore saved theme
const savedTheme = localStorage.getItem('yrTheme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
if(savedTheme === 'light') document.getElementById('themeToggle').checked = true;

function getVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// ── TOGGLE PERIOD ─────────────────────────────────────────────────────────────
function togglePeriod(){
  const on = document.getElementById('periodToggle').checked;
  document.getElementById('endDateWrap').classList.toggle('visible', on);
}

// ── PALETTE ───────────────────────────────────────────────────────────────────
// order: green(0) yellow(1) orange(2) red(3) blue(4)
const COLORS = [
  { id:'green',  hex:'#6dbb7a', lane:0, label:'Развитие'  },
  { id:'yellow', hex:'#d4b84a', lane:1, label:'Личное'    },
  { id:'orange', hex:'#d4884a', lane:2, label:'Семья'     },
  { id:'red',    hex:'#d46060', lane:3, label:'События'   },
  { id:'blue',   hex:'#4ab8cc', lane:4, label:'Работа'    },
];
let selColor = COLORS[0].id;

const COLOR_REMAP = { cyan:'blue', pink:'red', violet:'blue', teal:'green' };
function chex(id){
  const mapped = COLOR_REMAP[id] || id;
  return (COLORS.find(c=>c.id===mapped)||COLORS[0]).hex;
}
function colorDef(id){
  const mapped = COLOR_REMAP[id] || id;
  return COLORS.find(c=>c.id===mapped)||COLORS[0];
}

const swWrap = document.getElementById('swatches');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch' + (c.id===selColor?' active':'');
  s.style.background = c.hex;
  s.title = c.label;
  s.onclick = () => {
    selColor = c.id;
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
  };
  swWrap.appendChild(s);
});

// ── DATA ──────────────────────────────────────────────────────────────────────
const today = new Date(); today.setHours(0,0,0,0);
const YEAR      = today.getFullYear();
const yearStart = new Date(YEAR,0,1);
const totalDays = (new Date(YEAR,11,31)-yearStart)/86400000+1;

function dayOfYear(d){ return Math.round((d-yearStart)/86400000); }

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SH = ['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН',
                   'ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];

let events = [];

// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('ring');
const ctx    = canvas.getContext('2d');
let SIZE, cx, cy, OUTER, INNER, MID, TZ;
const MAX_LANES = 5;
let EVENT_W, EVENT_GAP, LANE_STEP;

function initSize(){
  const dpr = window.devicePixelRatio || 1;
  SIZE = Math.min(window.innerWidth-40, 560);
  canvas.style.width  = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
  canvas.width  = SIZE * dpr;
  canvas.height = SIZE * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = cy = SIZE/2;
  OUTER = SIZE*0.42;
  INNER = SIZE*0.22;
  MID   = (OUTER+INNER)/2;
  TZ    = OUTER-INNER;
  EVENT_GAP  = TZ*0.03;
  EVENT_W    = (TZ-EVENT_GAP*(MAX_LANES+1))/MAX_LANES;
  LANE_STEP  = EVENT_W+EVENT_GAP;
}
initSize();

function d2a(di){ return -Math.PI/2+((di-dayOfYear(today))/totalDays)*2*Math.PI; }

// ── LANE ASSIGNMENT ───────────────────────────────────────────────────────────
function assignLanes(evList){
  const sorted=[...evList].map((ev,i)=>({...ev,_i:i})).sort((a,b)=>a.date.localeCompare(b.date));
  const laneEnd=new Array(MAX_LANES).fill(-1);
  sorted.forEach(ev=>{
    const si=dayOfYear(new Date(ev.date+'T00:00:00'));
    const ei=ev.dateEnd?dayOfYear(new Date(ev.dateEnd+'T00:00:00')):si;
    const preferred=colorDef(ev.color).lane;
    let chosen=preferred;
    if(laneEnd[preferred]>=si-1){
      chosen=-1;
      for(let o=1;o<MAX_LANES;o++){
        const a=(preferred+o)%MAX_LANES, b=(preferred-o+MAX_LANES)%MAX_LANES;
        if(laneEnd[a]<si-1){chosen=a;break;}
        if(laneEnd[b]<si-1){chosen=b;break;}
      }
      if(chosen===-1) chosen=preferred;
    }
    laneEnd[chosen]=ei;
    evList[ev._i]._lane=chosen;
  });
}

function isOverlap(ev){
  const si=dayOfYear(new Date(ev.date+'T00:00:00'));
  const ei=ev.dateEnd?dayOfYear(new Date(ev.dateEnd+'T00:00:00')):si;
  return events.some(o=>{
    if(o.id===ev.id||(o._lane||0)!==(ev._lane||0)) return false;
    const os=dayOfYear(new Date(o.date+'T00:00:00'));
    const oe=o.dateEnd?dayOfYear(new Date(o.dateEnd+'T00:00:00')):os;
    return si<=oe&&ei>=os;
  });
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,SIZE,SIZE);
  const ti=dayOfYear(today);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';

  // helper: css var resolved at draw time
  const ringPast   = dark ? '#1e2029' : '#dde0e8';
  const ringFuture = dark ? 'rgba(109,187,122,0.14)' : 'rgba(77,168,94,0.10)';
  const ringBorder = dark ? '#2a2d38' : '#c8ccd8';
  const tickPast   = dark ? '#2a2d3a' : '#c8ccd8';
  const compassRing  = dark ? 'rgba(255,255,255,0.20)' : 'rgba(0,0,0,0.14)';
  const compassArrow = dark ? 'rgba(255,255,255,0.68)' : 'rgba(0,0,0,0.55)';
  const textHi  = dark ? 'rgba(230,235,250,0.92)' : 'rgba(30,35,60,0.90)';
  const textMid = dark ? 'rgba(200,205,228,0.80)' : 'rgba(50,60,100,0.72)';
  const textLo  = dark ? 'rgba(150,158,188,0.55)' : 'rgba(80,90,130,0.50)';
  const monCol  = dark ? '#9aa0c8' : '#6068a0';
  const monPast = dark ? '#484d6a' : '#b0b4cc';
  const divCol  = dark ? '#5a6080' : '#9098c0';
  const todaySeg= dark ? '#6dbb7a' : '#4da85e';

  // ── 1. Ring base ──
  if(ti>0){
    ctx.beginPath(); ctx.arc(cx,cy,MID,d2a(0),d2a(ti));
    ctx.lineWidth=TZ; ctx.strokeStyle=ringPast; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,MID,d2a(ti),d2a(totalDays-1)+(2*Math.PI/totalDays));
  ctx.lineWidth=TZ; ctx.strokeStyle=ringFuture; ctx.stroke();

  // ── 2. Border rings ──
  [OUTER,INNER].forEach(r=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=ringBorder; ctx.lineWidth=1; ctx.stroke();
  });

  // Annotation radii
  const TICK_S  = SIZE*0.013;
  const TICK_WE = SIZE*0.020;
  const TICK_5  = SIZE*0.017;
  const TICK_M  = SIZE*0.025;
  const NUM_R   = OUTER+SIZE*0.048;
  const MON_R   = OUTER+SIZE*0.076;

  // ── 3. Day ticks + numbers OUTSIDE ──
  for(let d=0;d<totalDays;d++){
    const date=new Date(yearStart.getTime()+d*86400000);
    const dow=date.getDay(), dom=date.getDate();
    const isWE=dow===0||dow===6;
    const is5=dom%5===0&&dom!==30;
    const is1=dom===1;
    const past=d<ti;
    const angle=d2a(d);

    let tl=TICK_S;
    if(is1) tl=TICK_M; else if(is5) tl=TICK_5; else if(isWE) tl=TICK_WE;

    const tickCol=past ? tickPast
      : is1  ? textHi
      : is5  ? textMid
      : isWE ? (dark?'rgba(109,187,122,0.65)':'rgba(77,168,94,0.55)')
      :         (dark?'rgba(109,187,122,0.28)':'rgba(77,168,94,0.22)');

    ctx.beginPath();
    ctx.moveTo(cx+OUTER*Math.cos(angle), cy+OUTER*Math.sin(angle));
    ctx.lineTo(cx+(OUTER+tl)*Math.cos(angle), cy+(OUTER+tl)*Math.sin(angle));
    ctx.strokeStyle=tickCol; ctx.lineWidth=1; ctx.stroke();

    if((is5||is1)&&d<totalDays){
      ctx.save();
      ctx.translate(cx+NUM_R*Math.cos(angle), cy+NUM_R*Math.sin(angle));
      ctx.rotate(angle+Math.PI/2);
      ctx.font=`${is1?'600':'400'} ${is1?SIZE*0.017:SIZE*0.015}px 'IBM Plex Mono'`;
      ctx.fillStyle=past ? (dark?'#383c52':'#b8bcd0') : (is1?textHi:textMid);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(dom),0,0);
      ctx.restore();
    }
  }

  // ── 4. Month dividers + names OUTSIDE ──
  for(let m=0;m<12;m++){
    const mDate=new Date(YEAR,m,1);
    const mIdx=dayOfYear(mDate);
    const dimM=new Date(YEAR,m+1,0).getDate();
    const angle=d2a(mIdx);
    const past=mIdx<ti;

    ctx.beginPath();
    ctx.moveTo(cx+INNER*Math.cos(angle),          cy+INNER*Math.sin(angle));
    ctx.lineTo(cx+(OUTER+TICK_M+2)*Math.cos(angle),cy+(OUTER+TICK_M+2)*Math.sin(angle));
    ctx.strokeStyle=past?(dark?'#404460':'#b8bcd8'):divCol; ctx.lineWidth=1; ctx.stroke();

    const mA=d2a(mIdx+Math.floor(dimM/2));
    ctx.save();
    ctx.translate(cx+MON_R*Math.cos(mA), cy+MON_R*Math.sin(mA));
    ctx.rotate(mA+Math.PI/2);
    ctx.font=`600 ${SIZE*0.020}px 'IBM Plex Sans'`;
    ctx.fillStyle=past?monPast:monCol;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(MONTHS_SH[m],0,0);
    ctx.restore();
  }

  // ── 5. Events ──
  assignLanes(events);
  function laneR(l){ return OUTER-EVENT_GAP-EVENT_W*0.5-l*LANE_STEP; }

  const periods=events.filter(e=>!!e.dateEnd);
  const points =events.filter(e=>!e.dateEnd);

  periods.forEach(ev=>{
    const startD=new Date(ev.date+'T00:00:00');
    const endD  =new Date(ev.dateEnd+'T00:00:00');
    if(startD.getFullYear()!==YEAR&&endD.getFullYear()!==YEAR) return;
    const si=Math.max(0,dayOfYear(startD));
    const ei=Math.min(totalDays-1,dayOfYear(endD));
    if(si>ei) return;
    const hex=chex(ev.color), past=ei<ti;
    const aS=d2a(si), aE=d2a(ei+0.8), r=laneR(ev._lane||0);
    const over=isOverlap(ev);

    if(over&&!past){
      ctx.save();
      ctx.setLineDash([SIZE*0.018,SIZE*0.010]);
      ctx.beginPath(); ctx.arc(cx,cy,r,aS,aE);
      ctx.lineWidth=EVENT_W; ctx.strokeStyle=hex+'70'; ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(cx,cy,r,aS,aE);
      ctx.lineWidth=EVENT_W; ctx.strokeStyle=past?(dark?'#242730':'#d8dce8'):hex+'80'; ctx.stroke();
      if(!past){
        ctx.beginPath(); ctx.arc(cx,cy,r+EVENT_W*0.5-0.5,aS,aE);
        ctx.lineWidth=1; ctx.strokeStyle=hex+'aa'; ctx.stroke();
      }
    }
    [aS,aE].forEach(a=>{
      const dx=cx+r*Math.cos(a), dy=cy+r*Math.sin(a);
      ctx.beginPath(); ctx.arc(dx,dy,EVENT_W*0.58,0,Math.PI*2);
      ctx.fillStyle=past?(dark?'#30333e':'#c8ccd8'):hex; ctx.fill();
      ctx.strokeStyle=dark?'#0c0d0f':'#f4f5f7'; ctx.lineWidth=1.2; ctx.stroke();
    });
  });

  points.forEach(ev=>{
    const evD=new Date(ev.date+'T00:00:00');
    if(evD.getFullYear()!==YEAR) return;
    const ei=dayOfYear(evD), angle=d2a(ei);
    const past=ei<ti, hex=chex(ev.color), r=laneR(ev._lane||0);
    const ex=cx+r*Math.cos(angle), ey=cy+r*Math.sin(angle);
    if(!past){
      ctx.beginPath();
      ctx.moveTo(cx+INNER*Math.cos(angle),cy+INNER*Math.sin(angle));
      ctx.lineTo(ex,ey);
      ctx.strokeStyle=hex+'25'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(ex,ey,EVENT_W*0.65,0,Math.PI*2);
    ctx.fillStyle=past?(dark?'#2e3038':'#c8ccd8'):hex; ctx.fill();
    ctx.strokeStyle=dark?'#0c0d0f':'#f4f5f7'; ctx.lineWidth=1.2; ctx.stroke();
  });

  // ── 6. Today segment ──
  const ta=d2a(ti);
  ctx.beginPath(); ctx.arc(cx,cy,MID,ta-0.005,ta+0.005);
  ctx.lineWidth=TZ-2; ctx.strokeStyle=todaySeg; ctx.stroke();

  // ── 7. Compass ring + arrow ──
  const COMP_R=INNER*0.88;
  ctx.beginPath(); ctx.arc(cx,cy,COMP_R,0,Math.PI*2);
  ctx.strokeStyle=compassRing; ctx.lineWidth=1.5; ctx.stroke();

  const arrowBase=cy-COMP_R, arrowTip=cy-INNER+4;
  ctx.beginPath(); ctx.moveTo(cx,arrowBase); ctx.lineTo(cx,arrowTip);
  ctx.strokeStyle=compassArrow; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx,arrowTip-8); ctx.lineTo(cx-4,arrowTip); ctx.lineTo(cx+4,arrowTip);
  ctx.closePath(); ctx.fillStyle=compassArrow; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2);
  ctx.fillStyle=compassRing; ctx.fill();

  // ── 8. Color legend inside compass ──
  const legendSpacing = COMP_R * 0.19;
  const totalH = legendSpacing * (COLORS.length-1);
  const legendStartY = cy - totalH/2;
  const dotR = SIZE*0.013;

  COLORS.forEach((c,i)=>{
    const ly = legendStartY + i*legendSpacing;
    ctx.beginPath(); ctx.arc(cx-SIZE*0.04, ly, dotR, 0, Math.PI*2);
    ctx.fillStyle = c.hex; ctx.fill();
    ctx.strokeStyle=dark?'#0c0d0f':'#f4f5f7'; ctx.lineWidth=1; ctx.stroke();
    ctx.font=`400 ${SIZE*0.024}px 'IBM Plex Mono'`;
    ctx.fillStyle=dark?'rgba(200,205,228,0.70)':'rgba(40,50,90,0.65)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('— '+c.label, cx-SIZE*0.04+dotR+SIZE*0.012, ly);
  });
}

// ── EVENTS LIST ───────────────────────────────────────────────────────────────
function fmtDate(str){ const p=str.split('-'); return `${p[2]}.${p[1]}`; }

function renderEvents(){
  const c=document.getElementById('eventsList');
  if(!events.length){ c.innerHTML='<span class="empty-msg">Нет событий — добавьте первое</span>'; return; }
  const sorted=[...events].sort((a,b)=>a.date.localeCompare(b.date));
  const bm={};
  sorted.forEach(ev=>{ const m=parseInt(ev.date.split('-')[1])-1; if(!bm[m])bm[m]=[]; bm[m].push(ev); });
  c.innerHTML='';
  Object.keys(bm).sort((a,b)=>a-b).forEach(m=>{
    const grp=document.createElement('div');
    grp.innerHTML=`<div class="month-name">${MONTHS_RU[m]}</div>`;
    bm[m].forEach(ev=>{
      const evD=new Date(ev.date+'T00:00:00');
      const past=ev.dateEnd?new Date(ev.dateEnd+'T00:00:00')<today:evD<today;
      const hex=chex(ev.color), isPer=!!ev.dateEnd;
      let daysStr='';
      if(isPer){ const diff=Math.round((new Date(ev.dateEnd+'T00:00:00')-evD)/86400000)+1; daysStr=`${diff} дн.`; }
      const item=document.createElement('div');
      item.className='event-item';
      item.dataset.id = ev.id;
      const pastBar=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim();
      item.innerHTML=`
        <div class="ev-bar ${isPer?'period':'point'}" style="background:${past?'var(--border2)':hex}"></div>
        <div class="event-dates">${fmtDate(ev.date)}${isPer?'<br>'+fmtDate(ev.dateEnd):''}</div>
        <div class="event-name" style="opacity:${past?0.38:1};color:${past?'var(--muted)':hex+'dd'}">${ev.name}</div>
        ${isPer?`<span class="ev-badge" style="background:${past?'var(--surface2)':hex+'1a'};color:${past?'var(--muted)':hex}">${daysStr}</span>`:''}
        <button class="event-edit" onclick="editEvent('${ev.id}')" title="Редактировать">✎</button>
        <button class="event-del" onclick="removeEvent('${ev.id}')" title="Удалить">✕</button>`;
      grp.appendChild(item);
    });
    c.appendChild(grp);
  });
}

async function supa(path, opts={}){
  const res = await fetch(SUPA_URL+path, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+(currentSession?.access_token||SUPA_KEY),
      'Content-Type': 'application/json',
      'Prefer': opts.prefer||''
    }, ...opts
  });
  if(!res.ok && res.status!==204) throw await res.json();
  return res.status===204?null:res.json();
}

async function onSignIn(session){
  currentSession=session;
  currentUser=session.user;
  // Save session
  localStorage.setItem('yrSession', JSON.stringify({access_token:session.access_token,refresh_token:session.refresh_token,user:session.user}));
  document.getElementById('authOverlay')?.remove();
  // Show user email in header
  const emailEl=document.getElementById('userEmail');
  if(emailEl) emailEl.textContent=currentUser.email;
  document.getElementById('authBtn').style.display='none';
  document.getElementById('userInfo').style.display='flex';
  await loadEvents();
}

async function authSignOut(){
  try{ await supa('/auth/v1/logout',{method:'POST'}); }catch(e){}
  currentSession=null; currentUser=null;

// ── LOAD / SAVE EVENTS ────────────────────────────────────────────────────────
async function loadEvents(){
  if(!currentSession) return;
  try{
    const data = await supa('/rest/v1/events?select=*&order=date.asc',{prefer:'return=representation'});
    events = (data||[]).map(r=>({
      id: r.id, name: r.title, date: r.date,
      dateEnd: r.date_end||null, color: r.color
    }));
    draw(); renderEvents();
  }catch(e){ console.error('Load events error',e); }
}

// ── ADD / REMOVE ──────────────────────────────────────────────────────────────
async function addEvent(){
  const name=document.getElementById('evName').value.trim();
  const date=document.getElementById('evDate').value;
  const hasPer=document.getElementById('periodToggle').checked;
  const dateEnd=hasPer?document.getElementById('evDateEnd').value:null;
  if(!name||!date) return;
  if(hasPer&&(!dateEnd||dateEnd<=date)){
    const el=document.getElementById('evDateEnd');
    el.style.borderColor='#d46060';
    setTimeout(()=>el.style.borderColor='',1200);
    return;
  }
  if(!currentUser){ alert('Войдите чтобы добавлять события'); return; }
  try{
    const row = await supa('/rest/v1/events',{
      method:'POST', prefer:'return=representation',
      body:JSON.stringify({
        user_id: currentUser.id,
        title: name, date, date_end: dateEnd||null, color: selColor
      })
    });
    const r=Array.isArray(row)?row[0]:row;
    events.push({id:r.id,name:r.title,date:r.date,dateEnd:r.date_end||null,color:r.color});
    document.getElementById('evName').value='';
    document.getElementById('evDate').value='';
    document.getElementById('evDateEnd').value='';
    draw(); renderEvents();
  }catch(e){ console.error('Add event error',e); }
}

async function removeEvent(id){
  if(!currentUser) return;
  try{
    await supa('/rest/v1/events?id=eq.'+id,{method:'DELETE'});
    events=events.filter(e=>e.id!==id);
    draw(); renderEvents();
  }catch(e){ console.error('Remove event error',e); }
}

function editEvent(id){
  const ev = events.find(e=>e.id===id);
  if(!ev) return;
  const item = document.querySelector(`[data-id="${id}"]`);
  if(!item) return;
  const hex = chex(ev.color);
  const isPer = !!ev.dateEnd;
  item.classList.add('editing');
  item.innerHTML = `
    <div class="ev-bar ${isPer?'period':'point'}" style="background:${hex}"></div>
    <input class="edit-field edit-name" id="ei-name-${id}" value="${ev.name}" placeholder="Название">
    <input class="edit-field edit-date" id="ei-date-${id}" type="date" value="${ev.date}">
    ${isPer ? `<input class="edit-field edit-date" id="ei-end-${id}" type="date" value="${ev.dateEnd||''}">` : ''}
    <button class="edit-save" onclick="saveEdit('${id}')">✓</button>
    <button class="edit-cancel" onclick="renderEvents()">✕</button>
  `;
  document.getElementById(`ei-name-${id}`).focus();
}

async function saveEdit(id){
  const ev = events.find(e=>e.id===id);
  if(!ev) return;
  const name = document.getElementById(`ei-name-${id}`)?.value.trim();
  const date = document.getElementById(`ei-date-${id}`)?.value;
  const dateEnd = document.getElementById(`ei-end-${id}`)?.value || null;
  if(!name||!date) return;
  try{
    await supa('/rest/v1/events?id=eq.'+id,{
      method:'PATCH', prefer:'return=representation',
      body: JSON.stringify({title:name, date, date_end:dateEnd})
    });
    const idx = events.findIndex(e=>e.id===id);
    events[idx] = {...ev, name, date, dateEnd};
    draw(); renderEvents();
  }catch(e){ console.error('Edit error',e); }
}

// Auth init
(async function initAuth(){
  // Check for OAuth callback token in URL hash
  const hash = window.location.hash;
  if(hash.includes('access_token')){
    const params = new URLSearchParams(hash.slice(1));
    const session = {
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token'),
      user: JSON.parse(atob(params.get('access_token').split('.')[1]))
    };
    history.replaceState(null,'',window.location.pathname);
    await onSignIn(session);
    return;
  }
  // Try saved session
  const saved = localStorage.getItem('yrSession');
  if(saved){
    try{
      const s = JSON.parse(saved);
      // Refresh token
      const data = await supa('/auth/v1/token?grant_type=refresh_token',{
        method:'POST', body:JSON.stringify({refresh_token:s.refresh_token})
      });
      await onSignIn(data);
      return;
    }catch(e){ localStorage.removeItem('yrSession'); }
  }
  showAuthUI();
})();
